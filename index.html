<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>Tap Rush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <h1>Tap Rush</h1>
            </div>
            <p class="tagline">Tap fast. Score big. Beat the clock!</p>
            <div class="instructions">
                <p>🎯 Tap the targets before they disappear</p>
                <p>⏱️ 30 seconds on the clock</p>
                <p>🔥 Build combos for bonus points</p>
            </div>
            <button id="start-btn" class="btn btn-primary">
                <span>▶</span> Play Now
            </button>
            <div class="high-score-display">
                🏆 Best: <span id="best-score-start">0</span>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div class="hud">
                <div class="hud-item">
                    <span class="hud-label">Score</span>
                    <span id="score" class="hud-value">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Time</span>
                    <span id="time" class="hud-value">30</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Combo</span>
                    <span id="combo" class="hud-value">x1</span>
                </div>
            </div>
            <canvas id="game-canvas"></canvas>
            <div id="combo-popup" class="combo-popup hidden"></div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <div class="result-card">
                <div class="result-icon">🎯</div>
                <h2>Game Over!</h2>
                <div class="final-score">
                    <span class="score-label">Score</span>
                    <span id="final-score" class="score-value">0</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-label">Hits</span>
                        <span id="stat-hits" class="stat-value">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Missed</span>
                        <span id="stat-missed" class="stat-value">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Accuracy</span>
                        <span id="stat-accuracy" class="stat-value">0%</span>
                    </div>
                </div>
                <div class="high-score-new hidden" id="new-best">🏆 New Best Score!</div>
            </div>
            <div class="btn-group">
                <button id="restart-btn" class="btn btn-primary">
                    <span>↻</span> Play Again
                </button>
                <button id="share-btn" class="btn btn-secondary">
                    <span>📤</span> Share Score
                </button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
